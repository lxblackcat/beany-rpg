<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">

<title>Beany · 三天 · B组</title>
<style>
:root{--bg:#0d1117;--c:#161b22;--b:#30363d;--t:#c9d1d9;--d:#8b949e;--g:#d2991d;--a:#58a6ff;--r:#f85149;--gr:#3fb950}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,"PingFang SC","Microsoft YaHei",sans-serif;background:var(--bg);color:var(--t);display:flex;justify-content:center;min-height:100dvh}
#app{width:100%;max-width:460px;display:flex;flex-direction:column;min-height:100dvh;padding-bottom:env(safe-area-inset-bottom,12px)}
#bar{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;background:var(--c);border-bottom:1px solid var(--b);position:sticky;top:0;z-index:10;gap:8px}
#bar .day{background:var(--a);color:#000;padding:2px 10px;border-radius:12px;font-size:12px;font-weight:700}
#bar .hp-wrap{flex:1;height:6px;background:#21262d;border-radius:3px;overflow:hidden}
#bar .hp-fill{height:100%;border-radius:3px;transition:width .6s;background:linear-gradient(90deg,var(--r),var(--g),var(--gr))}
#bar .hp-num{font-size:11px;color:var(--d);min-width:36px;text-align:right}
#wrap{flex:1;display:flex;flex-direction:column;gap:8px;padding:10px 12px;overflow-y:auto}
.card{background:var(--c);border:1px solid var(--b);border-radius:10px;padding:12px 14px;animation:fade .3s}
@keyframes fade{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
.card .tag{display:inline-block;font-size:10px;padding:2px 8px;border-radius:8px;background:#21262d;margin-bottom:6px}
.w{font-size:13px;line-height:1.8;color:#b1bac4}
.bubble{padding:10px 14px;border-radius:12px;margin:4px 0;line-height:1.7;font-size:13px;max-width:90%;animation:fade .35s;background:#1e2318;align-self:flex-start;border:1px solid #3d4a2e}
.bubble .bm{font-size:11px;color:var(--g);margin-bottom:2px}
.bubble .ba{font-size:12px;color:var(--d);font-style:italic}
.bubble .br{font-size:10px;color:#6a7a5a;margin-top:2px}
.day-sep{text-align:center;padding:12px 0;margin:2px 0;border-top:1px solid var(--b);border-bottom:1px solid var(--b)}
.day-sep .dn{font-size:14px;color:var(--g);font-weight:600}
.day-sep .dm{font-size:11px;color:var(--d);margin-top:2px}
.choices-wrap{background:var(--c);border:1px solid var(--b);border-radius:10px;padding:14px;margin-top:8px}
.choices-wrap h3{font-size:12px;color:var(--g);margin-bottom:10px}
.cbtn{display:block;width:100%;padding:12px 14px;margin:6px 0;background:#1c2433;border:1px solid #30363d;border-radius:10px;color:var(--t);text-align:left;cursor:pointer;transition:all .15s;font-size:13px;line-height:1.6}
.cbtn:active{background:#243044;border-color:var(--a)}
.cbtn .hint{display:block;font-size:11px;color:var(--d);margin-top:2px;font-style:italic}
.obtn{display:block;width:100%;padding:14px;margin-top:8px;background:var(--g);color:#000;border:none;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;text-align:center}
.obtn:active{opacity:.8}
.intro{padding:40px 20px 30px;text-align:center;flex:1;display:flex;flex-direction:column;justify-content:center;animation:fade .8s}
.intro .logo{font-size:56px;margin-bottom:4px;animation:float 3s ease-in-out infinite}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
.intro h1{font-size:24px;color:var(--g);margin-bottom:6px;letter-spacing:2px}
.intro .sub{font-size:13px;color:var(--d);margin-bottom:24px;line-height:1.8}
.intro .desc{font-size:13px;line-height:2;color:#b1bac4;margin-bottom:6px}
.intro .desc em{color:var(--g);font-style:normal}
.intro .note{font-size:11px;color:var(--d);margin-top:20px;line-height:1.6}
.sbtn{display:inline-block;padding:14px 48px;background:var(--g);color:#000;border:none;border-radius:24px;font-size:16px;font-weight:700;cursor:pointer;margin:20px auto 0;transition:transform .2s,box-shadow .2s;box-shadow:0 0 20px rgba(210,153,29,.15)}
.sbtn:hover{transform:scale(1.03);box-shadow:0 0 30px rgba(210,153,29,.3)}
.report{border-left:3px solid var(--g)!important;background:rgba(210,153,29,.06)!important;font-size:12px;line-height:1.8;color:#b1bac4;padding:12px 14px}
.elrow{display:flex;gap:3px;align-items:flex-end;height:36px;margin:8px 0}
.elbar{flex:1;border-radius:2px 2px 0 0;min-width:16px;position:relative}
.elbar .ev{position:absolute;top:-14px;left:50%;transform:translateX(-50%);font-size:9px;color:var(--d)}
.elbar .el{position:absolute;bottom:-14px;left:50%;transform:translateX(-50%);font-size:9px}
.cont{font-size:12px;line-height:1.8;color:var(--d);text-align:center;padding:8px;font-style:italic}
.log{font-size:11px;color:var(--d);text-align:center;padding:4px 0;font-style:italic}
</style>
</head>

// ══ Identity changes (from B组 identity_history + beany_identity) ══
const ID={};

       d2:{w:{金:22,木:20,水:19,火:20,土:19},dom:"金",hp:80,age:"青年",note:"金稳升——手势定型，Beany开始认得你的节奏"},
       d3:{w:{金:23,木:20,水:19,火:19,土:19},dom:"金",hp:95,age:"青年",note:"金最高——即使今天很难，Beany全勤回应"}};

       d2:{w:{金:22,木:20,水:19,火:20,土:19},dom:"金",hp:80,age:"青年",note:"金稳升——手势定型，水因零新互动下降"},

       d2:{w:{金:21,木:21,水:19,火:20,土:19},dom:"金",hp:80,age:"青年",note:"木追上来——Beany学会了不碰也能陪伴"},

       d2:{w:{金:22,木:20,水:19,火:20,土:19},dom:"金",hp:60,age:"青年",note:"金稳升——发现变化（朝向偏了），备忘录多了一页"},
       d3:{w:{金:21,木:20,水:18,火:21,土:20},dom:"金/火",hp:50,age:"青年",note:"金火并列——观察者也在被观察。反复，需观察"}};

// ══ Personality traits per dominant element ══
const TR={
  金:{t:"你一碰就有反应。什么都想凑过去。没事情坐不住。重复的很快就没兴趣了。新的最开心。",e:"对舒服敏感。好的来了就留在那。但容易腻。",a:"有偏好了。认得人了。经常来的手和第一次的手，能分出来。"},
  木:{t:"不太容易有反应。要很大刺激才会动。不急不慌。变化很慢，但变了就不会变回来。有自己的节奏。",e:"对舒服敏感。好的来了就留在那。",a:"有偏好了。有些主动靠近，有些避开。"},
  水:{t:"很敏感。一点变化就能注意到。主动试探不熟悉的。适应得快，也容易受影响。",e:"什么都想试。新触感新声音新光线——都好奇。但专注力不强。",a:"在快速吸收。每一样新东西都会留下痕迹。"},

  土:{t:"稳得住。不容易被带着走。对环境变化不敏感。一旦习惯了就不想换。",e:"反应慢半拍。但一旦有反应就是真的。不敷衍。需要时间。",a:"比较慢热。需要更多时间才能看到全部面貌。"}

// ══ ENGINE ══
const A=document.getElementById("app");
let S={scr:"intro",hp:50,w:{金:20,木:20,水:20,火:20,土:20},dom:"金",
  log:[],day:1,sn:0,styles:[],picks:[]};

function init(){
  S.hp=50;S.w={金:20,木:20,水:20,火:20,土:20};S.dom="金";
  S.log=[];S.day=1;S.sn=0;S.styles=[];S.picks=[];
}
function render(){
  if(S.scr==="intro")rIntro();
  else if(S.scr==="scene")rScene();
  else if(S.scr==="dayEnd")rDayEnd();
  else if(S.scr==="ending")rEnding();
}
function rIntro(){
  A.innerHTML=`<div class="intro"><div class="logo">🐾</div><h1>你与 Beany 的世界</h1><div class="sub">一只住在你口袋里的小动物<br>会长大、会记得、会因为你变成不同的样子</div><div class="desc">早上通勤 · 午间小憩 · 深夜回家<br>每个场景，你选一种方式对待它<br><em>它会真实地回应你</em></div><div class="desc" style="color:var(--d);font-size:12px">没有正确的玩法。<br>温柔、依赖、安静、好奇——<br>你的每一个选择，都在塑造它。</div><div class="note">36条支线 · 来自真实模拟数据<br>离线可玩 · 约10分钟</div><button class="sbtn" onclick="init();S.scr='scene';rScene()">进入</button></div>`;
}

function rScene(){
  const ss=["commute","lunch","evening"][S.sn%3];
  const dk="d"+S.day+"_"+ss;
  const sc=SCN[dk];
  if(!sc){ dayEnd(); return; }
  const isNew=S.sn%3===0;
  let h=topbar();
  h+=`<div id="wrap">`;
  S.log.forEach(s=>{
    if(s.t==="pick")h+=`<div class="log">你选了 <strong>${s.label}</strong></div>`;
    else if(s.t==="scene")h+=`<div class="card"><div class="tag">${s.label}</div><div class="w">${s.text}</div></div>`;
    else if(s.t==="beany"){const ah3=s.aha?" ✨":"";const el3=s.el?" ["+s.el+"]":"";h+=`<div class="bubble"${s.aha?" style=\"border-color:var(--g);background:#1e2318\"":""}><div class="bm">Beany · ${s.mood}${ah3}${el3}</div><div class="ba">${s.action}</div><div class="br">${s.reason||""}</div></div>`;}
    else if(s.t==="dayEnd")h+=s.html;
  });
  if(isNew){
    const dn={1:"第一天",2:"第二天",3:"第三天"};
    const dm={1:"心情基调：中性。Beany还是陌生的。",2:"心情基调：正面。Beany开始认得你了。",3:"心情基调：负面。今天很难。但Beany还在。"};
    h+=`<div class="day-sep"><div class="dn">✦ ${dn[S.day]} ✦</div><div class="dm">${dm[S.day]}</div></div>`;
    if(S.day>1)h+=`<div class="cont">Beany 记得之前的事。</div>`;
  }
  h+=`<div class="card"><div class="tag">${["🚇 通勤路上","🍱 午休","🏠 晚间"][S.sn%3]} · ${sc.label}</div><div class="w">${sc.env}</div></div>`;
  h+=`<div class="card" style="border:1px solid var(--g);font-size:13px;color:var(--t);padding:10px 14px">你怎么对待它？</div>`;
  h+=`</div><div class="choices-wrap">`;
  CARDS.forEach(c=>{
    h+=`<button class="cbtn" onclick="pick('${c.id}')" style="font-size:14px;padding:14px">${c.emoji} <strong>${c.label}</strong><span class="hint">${c.hint}</span></button>`;
  });
  h+=`</div>`;
  A.innerHTML=h;sd();
}

function pick(sid){
  const ss=["commute","lunch","evening"][S.sn%3];
  const key=sid+"_d"+S.day+"_"+ss;
  const rx=RX[key]||RX["f_d1_commute"];
  const card=CARDS.find(c=>c.id===sid);
  const sc=SCN["d"+S.day+"_"+ss];
  let h=topbar();
  h+=`<div id="wrap">`;
  S.log.forEach(s=>{
    if(s.t==="pick")h+=`<div class="log">你选了 <strong>${s.label}</strong></div>`;
    else if(s.t==="scene")h+=`<div class="card"><div class="tag">${s.label}</div><div class="w">${s.text}</div></div>`;
    else if(s.t==="beany"){const ah3=s.aha?" ✨":"";const el3=s.el?" ["+s.el+"]":"";h+=`<div class="bubble"${s.aha?" style=\"border-color:var(--g);background:#1e2318\"":""}><div class="bm">Beany · ${s.mood}${ah3}${el3}</div><div class="ba">${s.action}</div><div class="br">${s.reason||""}</div></div>`;}
    else if(s.t==="dayEnd")h+=s.html;
  });
  h+=`<div class="card"><div class="tag">${["🚇 通勤路上","🍱 午休","🏠 晚间"][S.sn%3]} · ${sc.label}</div><div class="w">${sc.env}</div></div>`;
  h+=`<div class="log">你选了 <strong>${card.label}</strong></div>`;
  rx.forEach(r=>{const ah=r.aha?" ✨":"";const el=r.el?" ["+r.el+"]":"";h+=`<div class="bubble"${r.aha?" style=\"border-color:var(--g);background:#1e2318\"":""}><div class="bm">Beany · ${r.m}${ah}${el}</div><div class="ba">${r.a}</div><div class="br">${r.r||""}</div></div>`;});
  h+=`</div>`;
  S.log.push({t:"pick",label:card.label});
  S.log.push({t:"scene",label:`${["🚇 通勤路上","🍱 午休","🏠 晚间"][S.sn%3]} · ${sc.label}`,text:sc.env});
  rx.forEach(r=>S.log.push({t:"beany",mood:r.m,action:r.a,reason:r.r,el:r.el||null,aha:r.aha||false}));
  S.picks.push(sid);S.styles.push(sid);S.sn++;
  if(S.sn%3===0){
    h+=`<div style="margin:8px 12px"><button class="obtn" onclick="dayEnd()">一天结束，看 Beany 的变化 →</button></div>`;
  }else{
    h+=`<div style="margin:8px 12px"><button class="obtn" onclick="S.scr='scene';rScene()">下一场 →</button></div>`;
  }
  A.innerHTML=h;sd();
}

function dayEnd(){
  // Use most frequent style this day
  const dayPicks=S.styles.slice(-3);
  const counts={};dayPicks.forEach(s=>counts[s]=(counts[s]||0)+1);
  let topS="f",topN=0;
  for(const[s,n]of Object.entries(counts)){if(n>topN){topS=s;topN=n;}}
  const ch=ID[topS]["d"+S.day];
  S.w=ch.w;S.dom=ch.dom;S.hp=ch.hp;S.day++;
  S.styles=[];
  const mx=Math.max(...Object.values(ch.w));
  let chart='<div class="elrow">';
  EL.forEach(el=>{
    const hh=Math.round(ch.w[el]/mx*30);
    chart+=`<div class="elbar" style="height:${hh}px;background:${EL_COLORS[el]}"><div class="ev">${ch.w[el]}%</div><div class="el">${el}</div></div>`;
  });
  chart+='</div>';
  const html=`<div class="card report"><div style="font-size:12px;line-height:1.8">📋 第${S.day-1}天结束<br><br>主导：<strong style="color:${EL_COLORS[ch.dom]}">${ch.dom}</strong> · ${ch.age}<br>健康：❤️ ${ch.hp}<br>${chart}<br><em>${ch.note}</em></div></div>`;
  S.log.push({t:"dayEnd",html});S.sn=0;
  if(S.day>3){S.scr="ending";render();}else{S.scr="scene";rScene();}
}

function rEnding(){
  // Use data from the most consistently chosen style
  const allPicks=S.picks;
  const scounts={};allPicks.forEach(s=>scounts[s]=(scounts[s]||0)+1);
  let topS="f",topN=0;
  for(const[s,n]of Object.entries(scounts)){if(n>topN){topS=s;topN=n;}}
  const ch=ID[topS].d3;
  const dom=ch.dom.includes("/")?ch.dom.split("/")[0].trim():ch.dom;
  const tr=TR[dom]||TR["金"];
  const card=CARDS.find(c=>c.id===topS);
  const mx=Math.max(...Object.values(ch.w));
  let chart='<div class="elrow">';
  EL.forEach(el=>{
    const hh=Math.round(ch.w[el]/mx*30);
    chart+=`<div class="elbar" style="height:${hh}px;background:${EL_COLORS[el]}"><div class="ev">${ch.w[el]}%</div><div class="el">${el}</div></div>`;
  });
  chart+='</div>';
  const gr=S.hp>=80?{s:"⭐⭐⭐",l:"Beany 已经完全信任你了",t:"它认得你的手指。在口袋里会主动往你手的方向蹭。"}:S.hp>=60?{s:"🌟🌟",l:"你们之间有了默契",t:"它不会在你不碰的时候闹。但你需要它的时候，它就在。"}:S.hp>=40?{s:"✨",l:"你们之间还不错",t:"有时候你会忘了它在口袋里。有时候你会特意摸摸它。"}:{s:"💛",l:"还需要一点时间",t:"Beany有点不确定你想要什么。但你不在的时候它就缩着。"};
  let hist='';
  S.log.forEach(s=>{
    if(s.t==="pick")hist+=`<div class="log">你选了 <strong>${s.label}</strong></div>`;
    else if(s.t==="scene")hist+=`<div class="card"><div class="tag">${s.label}</div><div class="w">${s.text}</div></div>`;
    else if(s.t==="beany"){const ah2=s.aha?" ✨":"";const el2=s.el?" ["+s.el+"]":"";hist+=`<div class="bubble"${s.aha?" style=\"border-color:var(--g);background:#1e2318\"":""}><div class="bm">Beany · ${s.mood}${ah2}${el2}</div><div class="ba">${s.action}</div><div class="br">${s.reason||""}</div></div>`;}
    else if(s.t==="dayEnd")hist+=s.html;
  });
  let h=`<div id="bar"><span class="day">结局</span><span style="font-size:11px;color:var(--d)">❤️ ${S.hp}</span><div class="hp-wrap"><div class="hp-fill" style="width:${S.hp}%"></div></div></div>`;
  h+=`<div id="wrap">${hist}<div style="text-align:center;padding:20px 0"><div style="font-size:32px">${gr.s}</div><h3 style="color:var(--g);margin:8px 0">${gr.l}</h3><div style="font-size:13px;color:var(--d);line-height:1.8;margin:8px 0">${gr.t}</div></div>`;
  h+=`<div class="card" style="text-align:left"><h4 style="color:var(--g);margin-bottom:8px">🐾 Beany 的三天画像</h4><p style="font-size:11px;color:var(--d)">主导：<strong style="color:${EL_COLORS[dom]}">${ch.dom}</strong> · ${ch.age} · 健康 ${S.hp}</p>${chart}<div style="font-size:12px;line-height:1.8;color:#b1bac4;margin-top:8px"><strong>脾气：</strong>${tr.t}<br><strong>表达：</strong>${tr.e}<br><strong>年龄：</strong>${tr.a}</div></div>`;
  h+=`<div style="text-align:center;font-size:11px;color:var(--d);margin:12px 0">你最常用 <strong>${card.label}</strong>（${topN}/9场）</div>`;
  h+=`<button class="obtn" onclick="location.reload()" style="margin:0 12px 20px">再来三天（换一种方式）</button></div>`;
  A.innerHTML=h;
}

function topbar(){
  return `<div id="bar"><span class="day">Day ${Math.min(S.day,3)}</span><div class="hp-wrap"><div class="hp-fill" style="width:${S.hp}%"></div></div><span class="hp-num">❤️ ${S.hp}</span></div>`;
}
function sd(){setTimeout(()=>{const w=document.getElementById("wrap");if(w)w.scrollTop=w.scrollHeight;},100);}
render();
</script>
